version: 2
updates:
  - package-ecosystem: npm
    directory: /
    commit-message:
      prefix: chore(deps)
      prefix-development: chore(deps-dev)
      include: scope
    groups:
      npm-minor-patch:
        patterns:
          - "*"
        update-types:
          - minor
          - patch
    schedule:
      interval: weekly
      day: monday
      time: "08:00"
      timezone: Europe/Amsterdam
    open-pull-requests-limit: 5

  - package-ecosystem: github-actions
    directory: /
    commit-message:
      prefix: ci
      include: scope
    schedule:
      interval: weekly
      day: monday
      time: "08:15"
      timezone: Europe/Amsterdam
    open-pull-requests-limit: 5
